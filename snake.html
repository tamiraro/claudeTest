<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
      user-select: none;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #4ade80;
      text-shadow: 0 0 20px #4ade8088;
      margin-bottom: 12px;
    }

    #scoreboard {
      display: flex;
      gap: 48px;
      margin-bottom: 20px;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
    }

    #scoreboard span { color: #e0e0e0; font-weight: 600; font-size: 1.2rem; }

    #canvas-wrapper {
      position: relative;
    }

    canvas {
      display: block;
      border: 2px solid #2a2a3e;
      border-radius: 8px;
      box-shadow: 0 0 40px #4ade8022;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 15, 26, 0.88);
      border-radius: 8px;
      gap: 16px;
    }

    #overlay.hidden { display: none; }

    #overlay h2 {
      font-size: 2rem;
      color: #4ade80;
      text-shadow: 0 0 16px #4ade8066;
    }

    #overlay p {
      font-size: 1rem;
      color: #aaa;
      text-align: center;
      line-height: 1.6;
    }

    #overlay .final-score {
      font-size: 1.3rem;
      color: #e0e0e0;
    }

    button {
      margin-top: 8px;
      padding: 12px 36px;
      background: #4ade80;
      color: #0f0f1a;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover { background: #22c55e; transform: scale(1.04); }
    button:active { transform: scale(0.98); }

    #controls {
      margin-top: 18px;
      font-size: 0.8rem;
      color: #555;
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<h1>SNAKE</h1>

<div id="scoreboard">
  Score: <span id="score">0</span>
  &nbsp;&nbsp;&nbsp;
  Best: <span id="best">0</span>
</div>

<div id="canvas-wrapper">
  <canvas id="canvas" width="480" height="480"></canvas>

  <div id="overlay">
    <h2 id="overlay-title">SNAKE</h2>
    <p id="overlay-msg">Use arrow keys or WASD to move.<br>Eat the food. Don't hit the walls or yourself.</p>
    <p class="final-score hidden" id="final-score"></p>
    <button id="btn">PLAY</button>
  </div>
</div>

<div id="controls">Arrow keys / WASD &nbsp;|&nbsp; P to pause</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayMsg = document.getElementById('overlay-msg');
  const finalScoreEl = document.getElementById('final-score');
  const btn = document.getElementById('btn');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');

  const CELL = 20;
  const COLS = canvas.width / CELL;
  const ROWS = canvas.height / CELL;
  const BASE_INTERVAL = 130;
  const MIN_INTERVAL = 60;

  let snake, dir, nextDir, food, score, best, gameLoop, paused, running;

  best = parseInt(localStorage.getItem('snakeBest') || '0');
  bestEl.textContent = best;

  function init() {
    const midX = Math.floor(COLS / 2);
    const midY = Math.floor(ROWS / 2);
    snake = [
      { x: midX, y: midY },
      { x: midX - 1, y: midY },
      { x: midX - 2, y: midY },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    paused = false;
    scoreEl.textContent = 0;
    spawnFood();
  }

  function spawnFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function step() {
    if (paused) return;

    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
    if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('snakeBest', best);
      }
      spawnFood();
      resetLoop();
    } else {
      snake.pop();
    }

    draw();
  }

  function speed() {
    return Math.max(MIN_INTERVAL, BASE_INTERVAL - score * 2);
  }

  function resetLoop() {
    clearInterval(gameLoop);
    gameLoop = setInterval(step, speed());
  }

  function startGame() {
    overlay.classList.add('hidden');
    finalScoreEl.classList.add('hidden');
    running = true;
    init();
    draw();
    resetLoop();
  }

  function endGame() {
    clearInterval(gameLoop);
    running = false;
    overlayTitle.textContent = 'GAME OVER';
    overlayMsg.textContent = '';
    finalScoreEl.textContent = `Score: ${score}`;
    finalScoreEl.classList.remove('hidden');
    btn.textContent = 'PLAY AGAIN';
    overlay.classList.remove('hidden');
  }

  // Drawing
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawFood();
    drawSnake();
  }

  function drawGrid() {
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= canvas.width; x += CELL) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= canvas.height; y += CELL) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
  }

  function drawFood() {
    const px = food.x * CELL;
    const py = food.y * CELL;
    const r = CELL / 2 - 2;
    const cx = px + CELL / 2;
    const cy = py + CELL / 2;

    ctx.shadowColor = '#f87171';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#f87171';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawSnake() {
    snake.forEach((seg, i) => {
      const px = seg.x * CELL + 1;
      const py = seg.y * CELL + 1;
      const size = CELL - 2;

      const t = i / (snake.length - 1 || 1);
      const r = Math.round(74 + (20 - 74) * t);
      const g = Math.round(222 + (160 - 222) * t);
      const b = Math.round(128 + (80 - 128) * t);

      ctx.fillStyle = `rgb(${r},${g},${b})`;

      if (i === 0) {
        ctx.shadowColor = '#4ade80';
        ctx.shadowBlur = 12;
      } else {
        ctx.shadowBlur = 0;
      }

      ctx.beginPath();
      ctx.roundRect(px, py, size, size, 4);
      ctx.fill();
    });
    ctx.shadowBlur = 0;
  }

  // Controls
  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp':    case 'w': case 'W': if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; break;
      case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = { x: 0, y: 1 };  break;
      case 'ArrowLeft':  case 'a': case 'A': if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; break;
      case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = { x: 1, y: 0 };  break;
      case 'p': case 'P':
        if (!running) return;
        paused = !paused;
        if (paused) {
          overlayTitle.textContent = 'PAUSED';
          overlayMsg.textContent = 'Press P to resume.';
          finalScoreEl.classList.add('hidden');
          btn.textContent = 'RESUME';
          overlay.classList.remove('hidden');
        } else {
          overlay.classList.add('hidden');
        }
        break;
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  });

  btn.addEventListener('click', () => {
    if (paused) {
      paused = false;
      overlay.classList.add('hidden');
    } else {
      startGame();
    }
  });
</script>
</body>
</html>
